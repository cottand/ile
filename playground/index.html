<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ile playground</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 24px;
        }
        h2 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .top-row {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }
        .panel {
            flex: 1;
            min-width: 0;
        }
        .panel-box {
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 16px;
            min-height: 250px;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #e0e0e0;
        }
        textarea.panel-box {
            width: 100%;
            resize: vertical;
            outline: none;
            height: 300px;
        }
        pre.panel-box {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            max-height: 400px;
        }
        #output-section { margin-top: 0; }
        #output-section pre.panel-box { min-height: 120px; max-height: 300px; }
        .loading-msg {
            color: #888;
            font-style: italic;
        }
        @media (max-width: 700px) {
            .top-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="top-row">
        <div class="panel">
            <h2>ile code</h2>
            <textarea class="panel-box" id="code-input" spellcheck="false">package main

val x: String = "a"

val exprTest = ( when x {
  "a" -> "yes"
  "b" -> "no"
})

fn main() { println("hi") }</textarea>
        </div>
        <div class="panel">
            <h2>Inferred types</h2>
            <pre class="panel-box" id="types-output"><span class="loading-msg">loading compiler...</span></pre>
        </div>
    </div>
    <div id="output-section">
        <h2>Program output</h2>
        <pre class="panel-box" id="program-output"></pre>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        const codeInput = document.getElementById('code-input');
        const typesOutput = document.getElementById('types-output');
        const programOutput = document.getElementById('program-output');

        let debounceTimer = null;

        async function loadWasm() {
            if (!WebAssembly) {
                typesOutput.textContent = 'WebAssembly is not supported in your browser';
                return;
            }
            const go = new Go();
            const resp = await fetch('/ile.wasm');
            const result = await WebAssembly.instantiate(
                await resp.arrayBuffer(),
                go.importObject,
            );
            go.run(result.instance);

            await new Promise(resolve => {
                const iv = setInterval(() => {
                    if (window.CheckAndShowTypes) {
                        clearInterval(iv);
                        resolve();
                    }
                }, 10);
            });

            typesOutput.textContent = '';
            compile(codeInput.value);
        }

        async function compile(code) {
            typesOutput.textContent = '';
            programOutput.textContent = '';

            if (!code.trim()) return;

            try {
                const result = await CompileAndShowGoOutput(code);
                typesOutput.textContent = result.types;
                try {
                    const stdout = await InterpretGo(result.goOutput);
                    programOutput.textContent = stdout;
                } catch (e) {
                    programOutput.textContent = e.message;
                }
            } catch (e) {
                typesOutput.textContent = e.message;
            }
        }

        codeInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => compile(codeInput.value), 400);
        });

        loadWasm().catch(err => {
            typesOutput.textContent = 'Failed to load compiler: ' + err.message;
        });
    </script>
</body>
</html>
